<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Available Rooms | Hotel</title>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--indigo-500: #6366f1;
			--indigo-600: #4f46e5;
			--glass-bg: rgba(17, 25, 40, 0.75);
			--glass-border: rgba(255, 255, 255, 0.125);
			--text-main: #ffffff;
		}

		body {
			margin: 0;
			font-family: 'Outfit', sans-serif;
			background: url('https://images.unsplash.com/photo-1618773928121-c32242e63f39?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
			background-size: cover;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-main);
			padding: 20px;
			box-sizing: border-box;
		}

		.glass-card {
			background: var(--glass-bg);
			backdrop-filter: blur(16px) saturate(180%);
			-webkit-backdrop-filter: blur(16px) saturate(180%);
			border-radius: 12px;
			border: 1px solid var(--glass-border);
			padding: 40px;
			width: 100%;
			max-width: 900px;
			box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
			text-align: center;
		}

		h1 {
			margin-top: 0;
			font-weight: 600;
			font-size: 2rem;
			background: linear-gradient(to right, #fff, #a5b4fc);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			margin-bottom: 0.5rem;
		}

		p.subtitle {
			color: #cbd5e1;
			margin-bottom: 2rem;
		}

		.rooms-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
			gap: 20px;
			margin-bottom: 30px;
		}

		.room-card {
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 12px;
			padding: 20px;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.room-card:hover {
			transform: translateY(-5px);
			background: rgba(255, 255, 255, 0.1);
			border-color: var(--indigo-500);
			box-shadow: 0 4px 15px rgba(0,0,0,0.2);
		}

		.room-number {
			font-size: 1.5rem;
			font-weight: 600;
			margin-bottom: 10px;
		}

		.btn {
			padding: 10px 20px;
			border: none;
			border-radius: 8px;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.3s ease;
			font-family: inherit;
			text-decoration: none;
			display: inline-block;
		}

		.btn-secondary {
			background: transparent;
			border: 1px solid rgba(255, 255, 255, 0.2);
			color: #e2e8f0;
		}

		.btn-secondary:hover {
			background: rgba(255, 255, 255, 0.05);
			border-color: #fff;
		}

		.btn-primary {
			background: var(--indigo-600);
			color: white;
			box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
		}

		.btn-primary:hover {
			background: var(--indigo-500);
			transform: translateY(-2px);
			box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.23);
		}

		/* Modal Styles */
		.modal-overlay {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.6);
			backdrop-filter: blur(5px);
			z-index: 1000;
			align-items: center;
			justify-content: center;
		}

		.modal-content {
			background: var(--glass-bg);
			backdrop-filter: blur(16px) saturate(180%);
			-webkit-backdrop-filter: blur(16px) saturate(180%);
			border-radius: 12px;
			border: 1px solid var(--glass-border);
			width: 90%;
			max-width: 400px;
			padding: 30px;
			box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
			text-align: center;
			animation: modalFadeIn 0.3s ease;
		}

		@keyframes modalFadeIn {
			from { opacity: 0; transform: translateY(-20px); }
			to { opacity: 1; transform: translateY(0); }
		}

		.glass-input {
			width: 100%;
			padding: 12px;
			margin: 20px 0;
			border-radius: 8px;
			border: 1px solid var(--glass-border);
			background: rgba(255, 255, 255, 0.05);
			color: #fff;
			font-size: 1rem;
			box-sizing: border-box;
			font-family: inherit;
		}

		.glass-input:focus {
			outline: none;
			border-color: var(--indigo-500);
			background: rgba(255, 255, 255, 0.1);
		}

		.modal-actions {
			display: flex;
			gap: 10px;
			justify-content: center;
		}
	</style>
</head>
<body>

	<div class="glass-card">
		<h1>Available Rooms</h1>
		<p class="subtitle">Showing availability for {{ in_d }} to {{ out_d }}</p>
		<p class="subtitle" style="margin-top: -1.5rem; color: #818cf8; font-weight: 600;">Price per night: ₹{{ price }}</p>

		{% if r %}
		<div class="rooms-grid">
			{% for i in r %}
			<div class="room-card" onclick="bookRoom('{{ i }}')">
				<div class="room-number">{{ i }}</div>
				<div style="color: #4ade80; font-size: 0.9rem;">Available</div>
			</div>
			{% endfor %}
		</div>
		{% else %}
		<div style="padding: 40px; color: #cbd5e1;">
			<p>Sorry, no rooms are available for these dates.</p>
		</div>
		{% endif %}

		<a href="/" class="btn btn-secondary">&larr; Back to Search</a>
	</div>

	<!-- Modal -->
	<div id="bookingModal" class="modal-overlay">
		<div class="modal-content">
			<h2 style="margin-top: 0; color: #fff;">Guest Details</h2>
			<p style="color: #cbd5e1;">Enter the name for the reservation.</p>
			<input type="text" id="guestName" class="glass-input" placeholder="Guest Name" style="margin-bottom: 10px;">
			<input type="tel" id="guestPhone" class="glass-input" placeholder="Phone Number" style="margin-top: 0;">
			<div class="modal-actions">
				<button onclick="closeModal()" class="btn btn-secondary" style="width: auto;">Cancel</button>
				<button onclick="confirmBooking()" class="btn btn-primary" style="width: auto;">Confirm Booking</button>
			</div>
		</div>
	</div>

	<script>
		let selectedRoom = null;

		function bookRoom(room) {
			selectedRoom = room;
			document.getElementById('bookingModal').style.display = 'flex';
			document.getElementById('guestName').focus();
		}

		function closeModal() {
			document.getElementById('bookingModal').style.display = 'none';
			document.getElementById('guestName').value = '';
			selectedRoom = null;
		}

		function confirmBooking() {
			const person = document.getElementById('guestName').value;
			if (person && selectedRoom) {
				window.location.href = "/book/" + selectedRoom + "/{{ in_d }}/{{ out_d }}/" + encodeURIComponent(person) + "/" + encodeURIComponent(phone) + "/{{ price }}";
			} else {
				alert("Please enter a guest name.");
			}
		}

		// Close modal when clicking outside
		window.onclick = function(event) {
			const modal = document.getElementById('bookingModal');
			if (event.target == modal) {
				closeModal();
			}
		}
	</script>

</body>
</html>
